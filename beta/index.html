<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Search - Mods Store</title>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-TMWFXQQD');</script>

    <style>
        :root {
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-bg: #ffffff;
            --search-bg: rgba(142, 142, 147, 0.12);
            --text-color: #000000;
            --line: rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000;
                --search-bg: rgba(255, 255, 255, 0.12);
                --text-color: #ffffff;
                --line: rgba(255,255,255,0.15);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--ios-bg);
            color: var(--text-color);
            margin: 0;
            padding: env(safe-area-inset-top) 20px 40px 20px;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Header & Search Bar --- */
        header {
            padding: 40px 0 10px 0;
            position: sticky;
            top: 0;
            background: var(--ios-bg);
            z-index: 10;
        }

        .category-name {
            color: var(--ios-gray);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .search-container {
            position: relative;
            margin-bottom: 10px;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input-wrapper input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border-radius: 12px;
            border: none;
            background: var(--search-bg);
            font-size: 17px;
            color: var(--text-color);
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            width: 20px;
            height: 20px;
            fill: var(--ios-gray);
            pointer-events: none;
        }

        /* --- Result List --- */
        .prod-list {
            display: flex;
            flex-direction: column;
            margin-top: 10px;
        }

        .prod-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--line);
            transition: opacity 0.2s;
            min-height: 70px;
        }

        .prod-item:active {
            opacity: 0.4;
        }

        .prod-icon {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: #eee;
        }

        .prod-info {
            flex: 1;
            min-width: 0;
        }

        .prod-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .prod-desc {
            font-size: 0.9rem;
            color: var(--ios-gray);
            margin: 3px 0 0;
            line-height: 1.3;
        }

        .prod-get-btn {
            background: #f0f0f7;
            color: var(--ios-blue);
            font-weight: 800;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        @media (prefers-color-scheme: dark) {
            .prod-get-btn { background: #1c1c1e; }
        }

        .hidden { display: none; }

        .lang-switcher {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
            background: var(--search-bg);
            backdrop-filter: blur(10px);
            padding: 5px;
            border-radius: 20px;
        }

        .lang-btn { cursor: pointer; border: none; background: none; font-size: 20px; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="lang-btn" onclick="changeLanguage('ja')">🇯🇵</button>
        <button class="lang-btn" onclick="changeLanguage('en')">🇺🇸</button>
    </div>

    <div class="container">
        <header id="ui-header">
            <p class="category-name">Search Mods</p>
            <h1 id="ui-page-title">Search</h1>
            
            <div class="search-container">
                <div class="search-input-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <input type="text" id="betaSearchBox" placeholder="Apps, Mods, and more" oninput="filterBetaSearch()">
                </div>
            </div>
        </header>

        <div class="prod-list" id="betaResultList"></div>
        
        <p id="betaNoResults" class="hidden" style="text-align: center; color: var(--ios-gray); margin-top: 60px; font-size: 1.1rem;">No Results</p>
    </div>

    <script>
        const i18n = {
            ja: {
                pageTitle: "検索", searchPlaceholder: "App、Modなど", get: "入手", noRes: "一致する結果がありません",
                status: { offline: "オフライン", online: "オンライン", ipa: "IPA", prod: "PROD" }
            },
            en: {
                pageTitle: "Search", searchPlaceholder: "Apps, Mods, and more", get: "GET", noRes: "No Results",
                status: { offline: "offline", online: "online", ipa: "ipa", prod: "PROD" }
            }
        };

        let currentLang = localStorage.getItem('lang') || (navigator.language.includes('ja') ? 'ja' : 'en');
        let allAppsGlobal = [];

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            updateUIText();
            filterBetaSearch(); // 再描画
        }

        function updateUIText() {
            const t = i18n[currentLang];
            document.getElementById('ui-page-title').textContent = t.pageTitle;
            document.getElementById('betaSearchBox').placeholder = t.searchPlaceholder;
            document.getElementById('betaNoResults').textContent = t.noRes;
        }

        async function loadAllData() {
            const ts = new Date().getTime();
            try {
                // 既存の全JSONを統合
                const [apps, oapps, iapps, prod] = await Promise.all([
                    fetch(`../apps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../oapps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../iapps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../prod.json?${ts}`).then(r => r.json()).catch(() => [])
                ]);

                const process = (data, type, color) => data.map(app => ({ ...app, type, color }));
                allAppsGlobal = [
                    ...process(apps, 'offline', '#000'),
                    ...process(oapps, 'online', '#28a745'),
                    ...process(iapps, 'ipa', '#000'),
                    ...process(prod, 'prod', '#ff3b30')
                ].sort((a, b) => a.name.localeCompare(b.name));

                updateUIText();
            } catch (e) {
                console.error("Data load failed", e);
            }
        }

        function filterBetaSearch() {
            const query = document.getElementById('betaSearchBox').value.trim().toLowerCase();
            const container = document.getElementById('betaResultList');
            const noRes = document.getElementById('betaNoResults');
            const t = i18n[currentLang];

            // 1. 入力が空なら何も表示しない
            if (query === "") {
                container.innerHTML = "";
                noRes.classList.add('hidden');
                return;
            }

            // 2. フィルタリング
            const filtered = allAppsGlobal.filter(app => 
                app.name.toLowerCase().includes(query) || 
                (app.type && app.type.toLowerCase().includes(query))
            );

            container.innerHTML = "";

            // 3. ヒットなし判定
            if (filtered.length === 0) {
                noRes.classList.remove('hidden');
                return;
            }
            noRes.classList.add('hidden');

            // 4. 描画
            filtered.forEach(app => {
                const item = document.createElement('a');
                item.href = app.link || "#";
                item.className = 'prod-item';

                // --- アイコンの柔軟な取得 ---
                // prod.jsonならresourcesから、その他はapp.iconがあればそれを使う
                let iconHtml = "";
                const iconUrl = app.icon || (app.codename ? `../resources/${app.codename}/icon.png` : null);
                
                if (iconUrl) {
                    // 画像があれば表示。onerrorで壊れた画像アイコンを隠す
                    iconHtml = `<img src="${iconUrl}" class="prod-icon" onerror="this.remove()">`;
                }

                const statusTxt = t.status[app.type] || app.type;
                const descTxt = app.description ? ` • ${app.description}` : "";

                item.innerHTML = `
                    ${iconHtml}
                    <div class="prod-info">
                        <h3 class="prod-title">${app.name}</h3>
                        <p class="prod-desc">
                            <span style="color: ${app.color || 'var(--ios-gray)'}; font-weight:bold; text-transform:capitalize;">${statusTxt}</span>${descTxt}
                        </p>
                    </div>
                    <span class="prod-get-btn">${t.get}</span>
                `;
                container.appendChild(item);
            });
        }

        window.onload = loadAllData;
    </script>
</body>
</html>
