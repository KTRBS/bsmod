<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>App Store - Mods</title>
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-bg: #ffffff;
            --card-bg: #ffffff;
            --search-bg: rgba(142, 142, 147, 0.12);
            --text-color: #000000;
            --line: rgba(0,0,0,0.1);
            --tab-bg: rgba(255, 255, 255, 0.85);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000;
                --card-bg: #1c1c1e;
                --search-bg: rgba(255, 255, 255, 0.12);
                --text-color: #ffffff;
                --line: rgba(255,255,255,0.15);
                --tab-bg: rgba(20, 20, 20, 0.85);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--ios-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0 16px 80px 16px;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden; /* 横揺れ防止 */
        }

        .hidden { display: none !important; }

        header { padding: 20px 0 10px 0; }
        .date-str { color: var(--ios-gray); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
        h1 { font-size: 2.1rem; margin: 0; font-weight: 800; letter-spacing: -0.5px; }

        .search-wrapper { position: relative; margin: 15px 0 25px 0; }
        .search-wrapper input { width: 100%; box-sizing: border-box; padding: 10px 10px 10px 35px; border-radius: 12px; border: none; background: var(--search-bg); font-size: 17px; color: var(--text-color); outline: none; }
        .search-icon-svg { position: absolute; left: 10px; top: 12px; width: 18px; height: 18px; fill: var(--ios-gray); }

        .grid-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .grid-container { grid-template-columns: 1fr 1fr; } }

        .random-featured-card { display: block; width: 100%; aspect-ratio: 21 / 9; background-size: cover; background-position: center; border-radius: 14px; position: relative; text-decoration: none; color: #fff; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .random-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        .random-tag { font-size: 0.7rem; font-weight: 700; opacity: 0.9; text-transform: uppercase; }
        .random-title { font-size: 1.4rem; font-weight: 800; margin-top: 2px; }

        .today-card { background: var(--card-bg); border-radius: 14px; padding: 16px; border: 1px solid var(--line); margin-bottom: 20px; }
        .card-header-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 15px; }

        /* --- Mod Row --- */
        .mod-row { display: flex; align-items: center; padding: 10px 0; text-decoration: none; color: inherit; border-bottom: 0.5px solid var(--line); width: 100%; box-sizing: border-box; }
        .mod-row:last-child { border-bottom: none; }
        .mod-icon { width: 60px; height: 60px; border-radius: 13px; object-fit: cover; flex-shrink: 0; background-color: var(--search-bg); }
        .mod-info { flex: 1; min-width: 0; padding: 0 12px; overflow: hidden; } /* min-width: 0 が重要 */
        .mod-name { font-size: 1rem; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: baseline; gap: 6px; }
        .version-label { color: var(--ios-gray); font-weight: 400; font-size: 0.85rem; }
        .mod-sub { font-size: 0.85rem; color: var(--ios-gray); margin-top: 2px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }

        .get-btn { background: #f0f0f7; color: var(--ios-blue); font-weight: 800; padding: 6px 18px; border-radius: 20px; font-size: 0.85rem; min-width: 50px; text-align: center; flex-shrink: 0; }
        @media (prefers-color-scheme: dark) { .get-btn { background: #3a3a3c; } }

        /* --- Ad Section --- */
        .ad-container { margin-top: 10px; text-align: center; overflow: hidden; }
        .ad-label { font-size: 0.65rem; color: var(--ios-gray); text-transform: uppercase; margin-bottom: 5px; display: block; letter-spacing: 1px; }

        #search-results { display: grid; grid-template-columns: 1fr; gap: 30px; }
        .search-result-item { display: flex; flex-direction: column; text-decoration: none; color: inherit; width: 100%; }
        .ss-container { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 12px; border: 0.5px solid var(--line); aspect-ratio: 16 / 9; background: var(--search-bg); }
        .ss-img { width: 100%; height: 100%; object-fit: cover; }

        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; padding-bottom: env(safe-area-inset-bottom); background: var(--tab-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top: 0.5px solid var(--line); display: flex; z-index: 1000; }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--ios-gray); text-decoration: none; font-size: 10px; width: 50%; }
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon-svg { width: 22px; height: 22px; margin-bottom: 2px; fill: currentColor; }
    </style>
</head>
<body>

    <div id="page-today">
        <header>
            <p class="date-str" id="display-date"></p>
            <h1>Today</h1>
        </header>
        <div class="grid-container">
            <div id="random-featured-area"></div>
            <div>
                <div class="today-card">
                    <div class="card-header-title">Play These Mods</div>
                    <div id="today-list"></div>
                </div>

                <div class="ad-container">
                    <span class="ad-label">Advertisement</span>
                    <div style="background: var(--search-bg); border-radius: 8px; min-height: 100px; display: flex; align-items: center; justify-content: center; color: var(--ios-gray); font-size: 0.8rem;">
                        Google Ads
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="page-search" class="hidden">
        <header><h1>Search</h1></header>
        <div class="search-wrapper">
            <svg class="search-icon-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="searchInput" placeholder="Apps, Mods, and more" oninput="runSearch()">
        </div>
        <div id="search-results"></div>
    </div>

    <nav class="tab-bar">
        <a href="javascript:void(0)" class="tab-item active" onclick="showTab('today')">
            <svg class="tab-icon-svg" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            Today
        </a>
        <a href="javascript:void(0)" class="tab-item" onclick="showTab('search')">
            <svg class="tab-icon-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            Search
        </a>
    </nav>

    <script>
        let allData = [];
        let prodData = [];
        const isJa = navigator.language.includes('ja');

        function showTab(name) {
            document.getElementById('page-today').classList.toggle('hidden', name !== 'today');
            document.getElementById('page-search').classList.toggle('hidden', name !== 'search');
            document.querySelectorAll('.tab-item').forEach((el, i) => {
                el.classList.toggle('active', (name==='today' && i===0) || (name==='search' && i===1));
            });
            window.scrollTo(0,0);
        }

        async function getModDetails(app) {
            if (!app.codename) return { version: "", desc: "" };
            try {
                const res = await fetch(`../resources/${app.codename}/version.json?${Date.now()}`);
                if(!res.ok) return { version: "", desc: "" };
                const data = await res.json();
                const desc = (data.meta && data.meta[isJa ? 'ja' : 'en']) ? data.meta[isJa ? 'ja' : 'en'].desc : (data.description || "");
                return { version: data.version ? "v" + data.version : "", desc: desc };
            } catch (e) {
                return { version: "", desc: "" };
            }
        }

        async function init() {
            document.getElementById('display-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            const ts = Date.now();
            try {
                const fetchJson = (url) => fetch(url + `?${ts}`).then(r => r.ok ? r.json() : []);
                const [apps, oapps, iapps, prod] = await Promise.all([
                    fetchJson('../apps.json'), fetchJson('../oapps.json'),
                    fetchJson('../iapps.json'), fetchJson('../prod.json')
                ]);
                prodData = prod;
                allData = [...apps, ...oapps, ...iapps, ...prod];
                
                renderRandomFeatured();
                await renderToday();
            } catch (e) { console.error(e); }
        }

        function renderRandomFeatured() {
            const area = document.getElementById('random-featured-area');
            const candidates = allData.filter(a => a.codename);
            if (!candidates.length) return;
            const picked = candidates[Math.floor(Math.random() * candidates.length)];
            const img = `../resources/${picked.codename}/ss1.png`;
            area.innerHTML = `
                <a href="${picked.link}" class="random-featured-card" style="background-image: url('${img}')">
                    <div class="random-overlay">
                        <div class="random-tag">Recommended</div>
                        <div class="random-title">${picked.name}</div>
                    </div>
                </a>`;
        }

        async function renderToday() {
            const container = document.getElementById('today-list');
            if(!container) return;
            container.innerHTML = "";
            for (const app of prodData) {
                const details = await getModDetails(app);
                const row = document.createElement('a');
                row.href = app.link;
                row.className = 'mod-row';
                const icon = `../resources/${app.codename}/icon.png`;
                row.innerHTML = `
                    <img src="${icon}" class="mod-icon" onerror="this.style.opacity='0'">
                    <div class="mod-info">
                        <div class="mod-name">${app.name} <span class="version-label">${details.version}</span></div>
                        <div class="mod-sub">${details.desc}</div>
                    </div>
                    <div class="get-btn">GET</div>`;
                container.appendChild(row);
            }
        }

        async function runSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const res = document.getElementById('search-results');
            if(!q) { res.innerHTML = ""; return; }
            
            const filtered = allData.filter(a => a.name.toLowerCase().includes(q));
            res.innerHTML = "";

            for (const app of filtered) {
                const details = await getModDetails(app);
                const item = document.createElement('a');
                item.href = app.link;
                item.className = 'search-result-item';
                const icon = `../resources/${app.codename}/icon.png`;
                const ss = `../resources/${app.codename}/ss1.png`;

                item.innerHTML = `
                    <div style="display: flex; align-items: center; width: 100%;">
                        <img src="${icon}" class="mod-icon" onerror="this.style.opacity='0'">
                        <div class="mod-info">
                            <div class="mod-name">${app.name} <span class="version-label">${details.version}</span></div>
                            <div class="mod-sub">${details.desc}</div>
                        </div>
                        <div class="get-btn">GET</div>
                    </div>
                    <div class="ss-container">
                        <img src="${ss}" class="ss-img" onerror="this.parentElement.remove()">
                    </div>`;
                res.appendChild(item);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
