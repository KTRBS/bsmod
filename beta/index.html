<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>App Store - Mods</title>
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-bg: #ffffff;
            --card-bg: #ffffff;
            --search-bg: rgba(142, 142, 147, 0.12);
            --text-color: #000000;
            --line: rgba(0,0,0,0.1);
            --tab-bg: rgba(255, 255, 255, 0.94);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000;
                --card-bg: #1c1c1e;
                --search-bg: rgba(255, 255, 255, 0.12);
                --text-color: #ffffff;
                --line: rgba(255,255,255,0.15);
                --tab-bg: rgba(20, 20, 20, 0.94);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--ios-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0 20px 80px 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .hidden { display: none !important; }

        header { padding: 30px 0 15px 0; }
        .date-str { color: var(--ios-gray); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        h1 { font-size: 2.1rem; margin: 0; font-weight: 800; letter-spacing: -1px; }

        /* --- Today's Mod (Featured Card) --- */
        .random-featured-card {
            display: block; width: 100%; aspect-ratio: 16 / 9; 
            background-size: cover; background-position: center;
            border-radius: 16px; position: relative; text-decoration: none;
            color: #fff; overflow: hidden; margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        /* 横画面ではFeaturedも少し高さを抑える */
        @media (orientation: landscape) {
            .random-featured-card { aspect-ratio: 21 / 9; max-height: 400px; }
        }
        .random-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .random-tag { font-size: 0.75rem; font-weight: 700; opacity: 0.8; text-transform: uppercase; }
        .random-title { font-size: 1.6rem; font-weight: 800; margin-top: 4px; }

        /* --- List Card Section --- */
        .today-card {
            background: var(--card-bg); border-radius: 16px; padding: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px;
            border: 1px solid var(--line);
        }
        .card-header-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 12px; }

        /* --- Grid System (横画面対応) --- */
        #today-list {
            display: grid;
            grid-template-columns: 1fr; /* デフォルトは1列 */
            gap: 0;
        }

        @media (orientation: landscape) or (min-width: 768px) {
            #today-list {
                grid-template-columns: 1fr 1fr; /* 横画面・タブレットで2列 */
                column-gap: 30px;
            }
        }

        .mod-row {
            display: flex; align-items: center; padding: 12px 0;
            text-decoration: none; color: inherit; border-bottom: 1px solid var(--line);
            cursor: pointer;
        }
        /* 2列の時は境界線の出方を調整 */
        @media (orientation: landscape) or (min-width: 768px) {
            .mod-row:nth-last-child(-n+2) { border-bottom: none; }
        }
        @media (orientation: portrait) and (max-width: 767px) {
            .mod-row:last-child { border-bottom: none; }
        }

        .mod-icon { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
        .mod-info { flex: 1; min-width: 0; padding: 0 12px; }
        .mod-name { font-size: 0.95rem; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mod-sub { font-size: 0.75rem; color: var(--ios-gray); margin-top: 2px; line-height: 1.2; }

        /* --- GET Button --- */
        .get-btn {
            background: #f0f0f7; color: var(--ios-blue); font-weight: 800;
            padding: 5px 14px; border-radius: 15px; font-size: 0.8rem;
            min-width: 64px; text-align: center; flex-shrink: 0;
            pointer-events: none;
        }
        @media (prefers-color-scheme: dark) { .get-btn { background: #3a3a3c; } }

        /* --- Slim Tab Bar --- */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
            padding-bottom: env(safe-area-inset-bottom);
            background: var(--tab-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 0.5px solid var(--line); display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--ios-gray); text-decoration: none; font-size: 9px; width: 50%; }
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon { font-size: 20px; margin-bottom: 1px; }

        /* Search Results Grid */
        #search-results {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (orientation: landscape) {
            #search-results { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div id="page-today">
        <header>
            <p class="date-str" id="display-date"></p>
            <h1>Today</h1>
        </header>

        <div id="random-featured-area"></div>

        <div class="today-card">
            <div class="card-header-title">Play These Mods</div>
            <div id="today-list"></div>
        </div>
    </div>

    <div id="page-search" class="hidden">
        <header><h1>Search</h1></header>
        <div style="position: relative; margin: 15px 0;">
            <span style="position: absolute; left: 10px; top: 10px; color: var(--ios-gray); font-size: 14px;">🔍</span>
            <input type="text" id="searchInput" placeholder="Apps, Mods, and more" 
            style="width: 100%; box-sizing: border-box; padding: 10px 10px 10px 35px; border-radius: 10px; border: none; background: var(--search-bg); font-size: 16px; color: var(--text-color); outline: none;" 
            oninput="runSearch()">
        </div>
        <div id="search-results"></div>
    </div>

    <nav class="tab-bar">
        <a href="javascript:void(0)" class="tab-item active" onclick="showTab('today')"><span class="tab-icon">📑</span>Today</a>
        <a href="javascript:void(0)" class="tab-item" onclick="showTab('search')"><span class="tab-icon">🔍</span>Search</a>
    </nav>

    <script>
        let allData = [];
        let prodData = [];

        function showTab(name) {
            document.getElementById('page-today').classList.toggle('hidden', name !== 'today');
            document.getElementById('page-search').classList.toggle('hidden', name !== 'search');
            document.querySelectorAll('.tab-item').forEach((el, i) => el.classList.toggle('active', (name==='today' && i===0) || (name==='search' && i===1)));
            window.scrollTo(0,0);
        }

        async function init() {
            document.getElementById('display-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            const ts = new Date().getTime();
            try {
                const [apps, oapps, iapps, prod] = await Promise.all([
                    fetch(`../apps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../oapps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../iapps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../prod.json?${ts}`).then(r => r.json()).catch(() => [])
                ]);

                prodData = prod.map(a => ({...a, type:'prod', color:'#ff3b30'}));
                allData = [
                    ...apps.map(a => ({...a, type:'offline', color:'#8e8e93'})),
                    ...oapps.map(a => ({...a, type:'online', color:'#28a745'})),
                    ...iapps.map(a => ({...a, type:'ipa', color:'#007aff'})),
                    ...prodData
                ];
                
                renderRandomFeatured();
                renderToday();
            } catch (e) { console.error(e); }
        }

        function renderRandomFeatured() {
            const area = document.getElementById('random-featured-area');
            const candidates = allData.filter(a => a.ss1 || a.icon || a.codename);
            if (candidates.length === 0) return;

            const picked = candidates[Math.floor(Math.random() * candidates.length)];
            // ss1があれば優先、なければicon
            const img = picked.ss1 ? `../${picked.ss1}` : (picked.codename ? `../resources/${picked.codename}/ss1.png` : `../resources/${picked.codename}/icon.png`);
            
            area.innerHTML = `
                <a href="${picked.link}" class="random-featured-card" style="background-image: url('${img}')">
                    <div class="random-overlay">
                        <div class="random-tag">Today's Mod</div>
                        <div class="random-title">${picked.name}</div>
                    </div>
                </a>
            `;
        }

        async function renderToday() {
            const container = document.getElementById('today-list');
            container.innerHTML = "";
            for (const app of prodData) {
                const row = document.createElement('a');
                row.href = app.link;
                row.className = 'mod-row';

                let versionText = "Play now";
                if (app.codename) {
                    try {
                        const v = await fetch(`../resources/${app.codename}/version.json`).then(r => r.json());
                        versionText = `v${v.version}<br>Updated: ${v.lastUpdated}`;
                    } catch(e) {}
                }

                const iconPath = app.icon ? `../${app.icon}` : `../resources/${app.codename}/icon.png`;
                row.innerHTML = `
                    <img src="${iconPath}" class="mod-icon">
                    <div class="mod-info">
                        <div class="mod-name">${app.name}</div>
                        <div class="mod-sub">${versionText}</div>
                    </div>
                    <div class="get-btn">GET</div>
                `;
                container.appendChild(row);
            }
        }

        function runSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const res = document.getElementById('search-results');
            res.innerHTML = "";
            if(!q) return;

            allData.filter(a => a.name.toLowerCase().includes(q)).forEach(app => {
                const item = document.createElement('a');
                item.href = app.link;
                item.style.cssText = "text-decoration:none; color:inherit; display:block; padding:15px 0; border-bottom:1px solid var(--line);";

                const iconUrl = app.icon ? `../${app.icon}` : (app.codename ? `../resources/${app.codename}/icon.png` : null);
                const ssUrl = (app.ss1) ? `../${app.ss1}` : (app.codename ? `../resources/${app.codename}/ss1.png` : null);

                let content = `<div style="display:flex; align-items:center;">`;
                if(iconUrl) content += `<img src="${iconUrl}" class="mod-icon">`;
                content += `
                    <div class="mod-info">
                        <div class="mod-name">${app.name}</div>
                        <div class="mod-sub"><span style="color:${app.color}; font-weight:bold;">${app.type.toUpperCase()}</span> • Mod</div>
                    </div>
                    <div class="get-btn">GET</div>
                </div>`;

                if(app.ss1 || app.codename) {
                    content += `<div class="ss-container"><img src="${ssUrl}" class="ss-img" onerror="this.parentElement.remove()"></div>`;
                }

                item.innerHTML = content;
                res.appendChild(item);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
