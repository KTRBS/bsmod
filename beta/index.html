<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>App Store - Mods</title>
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-bg: #ffffff;
            --card-bg: #ffffff;
            --search-bg: rgba(142, 142, 147, 0.12);
            --text-color: #000000;
            --line: rgba(0,0,0,0.1);
            --tab-bg: rgba(255, 255, 255, 0.9);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000;
                --card-bg: #1c1c1e;
                --search-bg: rgba(255, 255, 255, 0.12);
                --text-color: #ffffff;
                --line: rgba(255,255,255,0.15);
                --tab-bg: rgba(20, 20, 20, 0.85);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--ios-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0 20px 110px 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .hidden { display: none !important; }

        header { padding: 40px 0 20px 0; }
        .date-str { color: var(--ios-gray); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        h1 { font-size: 2.2rem; margin: 0; font-weight: 800; letter-spacing: -1px; }

        /* --- Today Section --- */
        .today-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border: 1px solid var(--line);
        }
        .card-header-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 15px; }

        /* --- List Row Item --- */
        .mod-row {
            display: flex; align-items: center; padding: 10px 0;
            text-decoration: none; color: inherit; border-bottom: 1px solid var(--line);
        }
        .mod-row:last-child { border-bottom: none; }
        
        .mod-icon { width: 62px; height: 62px; border-radius: 14px; object-fit: cover; flex-shrink: 0; }
        
        .mod-info { flex: 1; min-width: 0; padding: 0 12px; }
        .mod-name { font-size: 1rem; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mod-sub { font-size: 0.8rem; color: var(--ios-gray); margin-top: 2px; line-height: 1.3; }

        /* --- GET Button (App Store Size) --- */
        .get-btn {
            background: #f0f0f7; color: var(--ios-blue); font-weight: 800;
            padding: 6px 16px; border-radius: 18px; font-size: 0.85rem;
            min-width: 72px; text-align: center; flex-shrink: 0;
        }
        @media (prefers-color-scheme: dark) { .get-btn { background: #3a3a3c; } }

        /* --- Search View --- */
        .search-wrapper { position: relative; margin: 20px 0; }
        .search-wrapper input {
            width: 100%; box-sizing: border-box; padding: 10px 12px 10px 35px; border-radius: 10px; border: none; 
            background: var(--search-bg); font-size: 17px; color: var(--text-color); outline: none;
        }
        .search-icon { position: absolute; left: 10px; top: 10px; color: var(--ios-gray); }

        .search-result-item { display: flex; flex-direction: column; padding: 20px 0; border-bottom: 1px solid var(--line); text-decoration: none; color: inherit; }
        .ss-container { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 15px; border: 1px solid var(--line); }
        .ss-img { width: 100%; display: block; object-fit: cover; }

        /* --- Tab Bar --- */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px;
            background: var(--tab-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--line); display: flex; justify-content: space-around; padding-top: 10px; z-index: 100;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--ios-gray); text-decoration: none; font-size: 10px; }
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="page-today">
        <header>
            <p class="date-str" id="display-date"></p>
            <h1>Today</h1>
        </header>

        <div class="today-card">
            <div class="card-header-title">Play These Popular Games</div>
            <div id="today-list"></div>
        </div>
    </div>

    <div id="page-search" class="hidden">
        <header><h1>Search</h1></header>
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Apps, Mods, and more" oninput="runSearch()">
        </div>
        <div id="search-results"></div>
    </div>

    <nav class="tab-bar">
        <a href="#" class="tab-item active" onclick="showTab('today')"><span class="tab-icon">📑</span>Today</a>
        <a href="#" class="tab-item" onclick="showTab('search')"><span class="tab-icon">🔍</span>Search</a>
    </nav>

    <script>
        let allData = [];
        let prodData = [];

        function showTab(name) {
            event.preventDefault();
            document.getElementById('page-today').classList.toggle('hidden', name !== 'today');
            document.getElementById('page-search').classList.toggle('hidden', name !== 'search');
            document.querySelectorAll('.tab-item').forEach((el, i) => el.classList.toggle('active', (name==='today' && i===0) || (name==='search' && i===1)));
        }

        async function init() {
            document.getElementById('display-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            const ts = new Date().getTime();
            try {
                const [apps, oapps, iapps, prod] = await Promise.all([
                    fetch(`../apps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../oapps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../iapps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../prod.json?${ts}`).then(r => r.json()).catch(() => [])
                ]);
                prodData = prod.map(a => ({...a, type:'prod', color:'#ff3b30'}));
                allData = [
                    ...apps.map(a => ({...a, type:'offline', color:'#8e8e93'})),
                    ...oapps.map(a => ({...a, type:'online', color:'#28a745'})),
                    ...iapps.map(a => ({...a, type:'ipa', color:'#007aff'})),
                    ...prodData
                ];
                renderToday();
            } catch (e) { console.error(e); }
        }

        async function renderToday() {
            const container = document.getElementById('today-list');
            container.innerHTML = "";
            for (const app of prodData) {
                const row = document.createElement('a');
                row.href = app.link;
                row.className = 'mod-row';

                let versionText = "Play now";
                if (app.codename) {
                    try {
                        const v = await fetch(`../resources/${app.codename}/version.json`).then(r => r.json());
                        const vNum = v.version.toLowerCase().startsWith('v') ? v.version : 'v' + v.version;
                        // 改行を入れて表示
                        versionText = `${vNum}<br>Updated: ${v.lastUpdated}`;
                    } catch(e) {}
                }

                const iconPath = app.icon ? `../${app.icon}` : `../resources/${app.codename}/icon.png`;

                row.innerHTML = `
                    <img src="${iconPath}" class="mod-icon">
                    <div class="mod-info">
                        <div class="mod-name">${app.name}</div>
                        <div class="mod-sub">${versionText}</div>
                    </div>
                    <div class="get-btn">GET</div>
                `;
                container.appendChild(row);
            }
        }

        function runSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const res = document.getElementById('search-results');
            res.innerHTML = "";
            if(!q) return;

            allData.filter(a => a.name.toLowerCase().includes(q)).forEach(app => {
                const item = document.createElement('div');
                item.className = 'search-result-item';

                const iconUrl = app.icon ? `../${app.icon}` : (app.codename ? `../resources/${app.codename}/icon.png` : null);
                const ssUrl = (app.ss1) ? `../${app.ss1}` : (app.codename ? `../resources/${app.codename}/ss1.png` : null);

                // アイコンと基本情報の行
                let topHtml = `<div class="mod-row" style="border:none; padding:0;">`;
                if(iconUrl) topHtml += `<img src="${iconUrl}" class="mod-icon">`;
                topHtml += `
                    <div class="mod-info">
                        <div class="mod-name">${app.name}</div>
                        <div class="mod-sub"><span style="color:${app.color}; font-weight:bold;">${app.type.toUpperCase()}</span> • Mod</div>
                    </div>
                    <div class="get-btn">GET</div>
                </div>`;

                // スクリーンショット（存在する場合のみ）
                let ssHtml = "";
                if(app.ss1 || app.codename) {
                    ssHtml = `<div class="ss-container"><img src="${ssUrl}" class="ss-img" onerror="this.parentElement.remove()"></div>`;
                }

                item.innerHTML = topHtml + ssHtml;
                res.appendChild(item);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
