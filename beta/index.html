<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>App Store - Mods</title>
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-bg: #ffffff;
            --card-bg: #ffffff;
            --search-bg: rgba(142, 142, 147, 0.12);
            --text-color: #000000;
            --line: rgba(0,0,0,0.1);
            --tab-bg: rgba(255, 255, 255, 0.94);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000;
                --card-bg: #1c1c1e;
                --search-bg: rgba(255, 255, 255, 0.12);
                --text-color: #ffffff;
                --line: rgba(255,255,255,0.15);
                --tab-bg: rgba(20, 20, 20, 0.94);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
            background-color: var(--ios-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0 20px 80px 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .hidden { display: none !important; }

        /* --- Header --- */
        header { padding: 30px 0 15px 0; max-width: 800px; margin: 0 auto; }
        .date-str { color: var(--ios-gray); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        h1 { font-size: 2.1rem; margin: 0; font-weight: 800; letter-spacing: -1px; }

        /* --- Random Featured Card --- */
        .random-featured-card {
            display: block; width: 100%; max-width: 800px; margin: 0 auto 25px auto;
            aspect-ratio: 1 / 1.1; background-size: cover; background-position: center;
            border-radius: 16px; position: relative; text-decoration: none; color: #fff;
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        @media (orientation: landscape) { .random-featured-card { aspect-ratio: 21 / 9; } }

        .random-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .random-tag { font-size: 0.75rem; font-weight: 700; opacity: 0.8; text-transform: uppercase; }
        .random-title { font-size: 1.6rem; font-weight: 800; margin-top: 4px; }

        /* --- Today Card (Play These Mods) --- */
        .today-card {
            background: var(--card-bg); border-radius: 16px; padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin: 0 auto 30px auto;
            max-width: 800px; border: 1px solid var(--line);
        }
        .card-header-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 12px; }

        /* Today's List Grid */
        #today-list {
            display: grid; grid-template-columns: 1fr;
        }
        @media (orientation: landscape) {
            #today-list { grid-template-columns: 1fr 1fr; column-gap: 24px; }
        }

        /* --- Row Item Style --- */
        .mod-row {
            display: flex; align-items: center; padding: 12px 0;
            text-decoration: none; color: inherit; border-bottom: 1px solid var(--line);
        }
        @media (orientation: landscape) {
            /* 2カラム時は最後から2つ目までのボーダーを制御 */
            .mod-row:nth-last-child(-n+2) { border-bottom: none; }
        }
        @media (orientation: portrait) {
            .mod-row:last-child { border-bottom: none; }
        }

        .mod-icon { width: 58px; height: 58px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
        .mod-info { flex: 1; min-width: 0; padding: 0 12px; }
        .mod-name { font-size: 1rem; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mod-sub { font-size: 0.8rem; color: var(--ios-gray); margin-top: 2px; line-height: 1.3; }

        /* --- GET Button (Apple Standard) --- */
        .get-btn {
            background: #f0f0f7; color: var(--ios-blue); font-weight: 800;
            padding: 6px 18px; border-radius: 20px; font-size: 0.85rem;
            min-width: 72px; text-align: center; flex-shrink: 0;
        }
        @media (prefers-color-scheme: dark) { .get-btn { background: #3a3a3c; } }

        /* --- Search Section --- */
        .search-container { max-width: 800px; margin: 0 auto; }
        .search-input-wrapper { position: relative; margin: 15px 0 25px 0; }
        .search-input-wrapper input {
            width: 100%; box-sizing: border-box; padding: 10px 10px 10px 35px; border-radius: 10px; border: none; 
            background: var(--search-bg); font-size: 17px; color: var(--text-color); outline: none;
        }
        .search-icon-hint { position: absolute; left: 10px; top: 11px; color: var(--ios-gray); font-size: 14px; }

        /* Search Results - Image 2 Style Card */
        .search-result-card {
            display: flex; flex-direction: column; padding: 20px 0;
            border-bottom: 1px solid var(--line); text-decoration: none; color: inherit;
        }
        .ss-preview-container {
            width: 100%; border-radius: 12px; overflow: hidden; margin-top: 15px;
            aspect-ratio: 16 / 9; background: var(--search-bg); border: 1px solid var(--line);
        }
        .ss-img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* --- Tab Bar (Slim & Fixed) --- */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 50px;
            padding-bottom: env(safe-area-inset-bottom);
            background: var(--tab-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--line); display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--ios-gray); text-decoration: none; font-size: 10px; width: 50%; }
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon { font-size: 22px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="page-today">
        <header>
            <p class="date-str" id="display-date"></p>
            <h1>Today</h1>
        </header>

        <div id="random-featured-area"></div>

        <div class="today-card">
            <div class="card-header-title">Play These Mods</div>
            <div id="today-list"></div>
        </div>
    </div>

    <div id="page-search" class="hidden">
        <div class="search-container">
            <header><h1>Search</h1></header>
            <div class="search-input-wrapper">
                <span class="search-icon-hint">🔍</span>
                <input type="text" id="searchInput" placeholder="Apps, Mods, and more" oninput="runSearch()">
            </div>
            <div id="search-results"></div>
        </div>
    </div>

    <nav class="tab-bar">
        <a href="javascript:void(0)" class="tab-item active" onclick="showTab('today')">
            <span class="tab-icon">📑</span>Today
        </a>
        <a href="javascript:void(0)" class="tab-item" onclick="showTab('search')">
            <span class="tab-icon">🔍</span>Search
        </a>
    </nav>

    <script>
        let allData = [];
        let prodData = [];

        function showTab(name) {
            document.getElementById('page-today').classList.toggle('hidden', name !== 'today');
            document.getElementById('page-search').classList.toggle('hidden', name !== 'search');
            document.querySelectorAll('.tab-item').forEach((el, i) => el.classList.toggle('active', (name==='today' && i===0) || (name==='search' && i===1)));
            window.scrollTo(0,0);
        }

        async function init() {
            document.getElementById('display-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            const ts = new Date().getTime();
            try {
                const [apps, oapps, iapps, prod] = await Promise.all([
                    fetch(`../apps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../oapps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../iapps.json?${ts}`).then(r => r.json()).catch(() => []),
                    fetch(`../prod.json?${ts}`).then(r => r.json()).catch(() => [])
                ]);

                prodData = prod.map(a => ({...a, type:'prod', color:'#ff3b30'}));
                allData = [
                    ...apps.map(a => ({...a, type:'offline', color:'#8e8e93'})),
                    ...oapps.map(a => ({...a, type:'online', color:'#28a745'})),
                    ...iapps.map(a => ({...a, type:'ipa', color:'#007aff'})),
                    ...prodData
                ];
                
                renderRandomFeatured();
                renderToday();
            } catch (e) { console.error(e); }
        }

        // バージョン文字列の整形用（vVの重複を防ぐ）
        function formatVersion(v) {
            if (!v) return "";
            let str = v.toString().trim();
            // 先頭のvまたはVを削除してから、改めてvを付ける
            return "v" + str.replace(/^[vV]+/, "");
        }

        function renderRandomFeatured() {
            const area = document.getElementById('random-featured-area');
            const candidates = allData.filter(a => a.ss1 || a.codename);
            if (candidates.length === 0) return;

            const picked = candidates[Math.floor(Math.random() * candidates.length)];
            const img = picked.ss1 ? `../${picked.ss1}` : `../resources/${picked.codename}/ss1.png`;
            
            area.innerHTML = `
                <a href="${picked.link}" class="random-featured-card" style="background-image: url('${img}')">
                    <div class="random-overlay">
                        <div class="random-tag">Today's Mod</div>
                        <div class="random-title">${picked.name}</div>
                    </div>
                </a>
            `;
        }

        async function renderToday() {
            const container = document.getElementById('today-list');
            container.innerHTML = "";
            for (const app of prodData) {
                const row = document.createElement('a');
                row.href = app.link;
                row.className = 'mod-row';

                let versionDisplay = "Play now";
                if (app.codename) {
                    try {
                        const v = await fetch(`../resources/${app.codename}/version.json`).then(r => r.json());
                        versionDisplay = `${formatVersion(v.version)}<br>Updated: ${v.lastUpdated}`;
                    } catch(e) {}
                }

                const iconPath = app.icon ? `../${app.icon}` : `../resources/${app.codename}/icon.png`;
                row.innerHTML = `
                    <img src="${iconPath}" class="mod-icon">
                    <div class="mod-info">
                        <div class="mod-name">${app.name}</div>
                        <div class="mod-sub">${versionDisplay}</div>
                    </div>
                    <div class="get-btn">GET</div>
                `;
                container.appendChild(row);
            }
        }

        function runSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const res = document.getElementById('search-results');
            res.innerHTML = "";
            if(!q) return;

            allData.filter(a => a.name.toLowerCase().includes(q)).forEach(app => {
                const card = document.createElement('a');
                card.href = app.link;
                card.className = 'search-result-card';

                const iconUrl = app.icon ? `../${app.icon}` : (app.codename ? `../resources/${app.codename}/icon.png` : null);
                const ssUrl = app.ss1 ? `../${app.ss1}` : (app.codename ? `../resources/${app.codename}/ss1.png` : null);

                // 上部（アイコン、名前、GET）
                let html = `
                    <div style="display:flex; align-items:center;">
                        <img src="${iconUrl}" class="mod-icon">
                        <div class="mod-info">
                            <div class="mod-name">${app.name}</div>
                            <div class="mod-sub"><span style="color:${app.color}; font-weight:bold;">${app.type.toUpperCase()}</span> • Mod</div>
                        </div>
                        <div class="get-btn">GET</div>
                    </div>
                `;

                // スクリーンショット（存在する場合のみ）
                if (ssUrl) {
                    html += `
                        <div class="ss-preview-container">
                            <img src="${ssUrl}" class="ss-img" onerror="this.parentElement.style.display='none'">
                        </div>
                    `;
                }

                card.innerHTML = html;
                res.appendChild(card);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
