<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>App Store - Mods</title>
    <style>
        :root {
            --ios-blue: #007aff; --ios-gray: #8e8e93; --ios-bg: #ffffff;
            --card-bg: #ffffff; --search-bg: rgba(142, 142, 147, 0.12);
            --text-color: #000000; --line: rgba(0,0,0,0.1); --tab-bg: rgba(255, 255, 255, 0.85);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000; --card-bg: #1c1c1e; --search-bg: rgba(255, 255, 255, 0.12);
                --text-color: #ffffff; --line: rgba(255,255,255,0.15); --tab-bg: rgba(20, 20, 20, 0.85);
            }
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--ios-bg); color: var(--text-color); margin: 0; padding: 0 16px 70px 16px; overflow-x: hidden; box-sizing: border-box; }
        .hidden { display: none !important; }
        header { padding: 20px 0 10px 0; }
        h1 { font-size: 1.8rem; margin: 0; font-weight: 800; }
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .today-card { background: var(--card-bg); border-radius: 14px; padding: 16px; border: 1px solid var(--line); }
        .mod-row { display: flex; align-items: center; padding: 10px 0; text-decoration: none; color: inherit; border-bottom: 1px solid var(--line); }
        .mod-icon { width: 52px; height: 52px; border-radius: 11px; object-fit: cover; }
        .mod-info { flex: 1; padding: 0 10px; min-width: 0; }
        .mod-name { font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mod-sub { font-size: 0.8rem; color: var(--ios-gray); margin-top: 2px; -webkit-line-clamp: 2; -webkit-box-orient: vertical; display: -webkit-box; overflow: hidden; }
        .search-wrapper { position: relative; margin: 15px 0 25px 0; }
        .search-wrapper input { width: 100%; padding: 10px 10px 10px 35px; border-radius: 10px; border: none; background: var(--search-bg); color: var(--text-color); box-sizing: border-box; }
        .ss-container { margin-top: 12px; border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; }
        .ss-img { width: 100%; height: 100%; object-fit: cover; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 48px; background: var(--tab-bg); backdrop-filter: blur(25px); border-top: 0.5px solid var(--line); display: flex; justify-content: space-around; z-index: 1000; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--ios-gray); text-decoration: none; font-size: 9px; padding-top: 4px; }
        .tab-item.active { color: var(--ios-blue); }
    </style>
</head>
<body>

    <div id="page-today"><header><h1>Today</h1></header><div id="today-list" class="today-card"></div></div>
    <div id="page-search" class="hidden">
        <header><h1>Search</h1></header>
        <div class="search-wrapper"><input type="text" id="searchInput" placeholder="Search..." oninput="runSearch()"></div>
        <div id="search-results"></div>
    </div>

    <nav class="tab-bar">
        <a href="javascript:void(0)" class="tab-item active" onclick="showTab('today')">Today</a>
        <a href="javascript:void(0)" class="tab-item" onclick="showTab('search')">Search</a>
    </nav>

    <script>
        let allData = [], isLoaded = false;
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

        function showTab(name) {
            document.getElementById('page-today').classList.toggle('hidden', name !== 'today');
            document.getElementById('page-search').classList.toggle('hidden', name !== 'search');
            window.scrollTo(0,0);
        }

        async function init() {
            try {
                const [apps, oapps, iapps, prod] = await Promise.all([
                    fetch('./apps.json').then(r=>r.json()).catch(()=>[]),
                    fetch('./oapps.json').then(r=>r.json()).catch(()=>[]),
                    fetch('./iapps.json').then(r=>r.json()).catch(()=>[]),
                    fetch('./prod.json').then(r=>r.json()).catch(()=>[])
                ]);
                allData = [...apps, ...oapps, ...iapps, ...prod];
                isLoaded = true;

                // URLパラメータ処理
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (id) {
                    document.getElementById('searchInput').value = id;
                    runSearch();
                    showTab('search');
                }
            } catch(e) { console.error(e); }
        }

        async function runSearch() {
            if (!isLoaded) { setTimeout(runSearch, 100); return; }
            const q = document.getElementById('searchInput').value.toLowerCase();
            const res = document.getElementById('search-results');
            res.innerHTML = "";
            const filtered = allData.filter(a => a.name.toLowerCase().includes(q));
            
            for (const app of filtered) {
                const item = document.createElement('div');
                item.className = 'today-card';
                item.innerHTML = `
                    <div class="mod-row">
                        <img src="./resources/${app.codename}/icon.png" class="mod-icon">
                        <div class="mod-info">
                            <div class="mod-name">${app.name}</div>
                        </div>
                    </div>
                    <div class="ss-container"><img src="./resources/${app.codename}/ss1.png" class="ss-img"></div>
                `;
                res.appendChild(item);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
