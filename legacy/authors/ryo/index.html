<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Developer Profile</title>
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --secondary-text: #8e8e93;
            --btn-blue: #007aff;
            --line: rgba(0,0,0,0.1);
            --btn-bg: #f0f0f7;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #ffffff;
                --secondary-text: #8e8e93;
                --line: rgba(255,255,255,0.15);
                --btn-bg: #1c1c1e;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Navigation --- */
        .nav-bar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 15px; display: flex; align-items: center;
        }
        @media (prefers-color-scheme: dark) { .nav-bar { background: rgba(0,0,0,0.7); } }

        .back-btn {
            text-decoration: none; color: var(--btn-blue);
            font-size: 1.1rem; font-weight: 500; display: flex; align-items: center;
        }
        .back-btn::before {
            content: ''; display: inline-block; width: 10px; height: 10px;
            border-left: 2.5px solid var(--btn-blue); border-bottom: 2.5px solid var(--btn-blue);
            transform: rotate(45deg); margin-right: 8px;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 10px 20px 40px; }
        
        /* --- Header --- */
        .dev-header { margin: 10px 0 35px; }
        .dev-name { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; margin: 0; }

        .section-title h2 { font-size: 1.4rem; font-weight: 700; margin: 0 0 15px; }
        
        /* --- App List Scroll Area --- */
        .app-scroll-container {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            gap: 15px; margin: 0 -20px; padding: 0 20px 20px;
        }
        .app-scroll-container::-webkit-scrollbar { display: none; }

        /* 3つのアイテムを保持する縦列 */
        .app-column {
            flex: 0 0 calc(100% - 15px); /* 次の列がチラ見えするように調整 */
            display: flex; flex-direction: column; gap: 12px;
            scroll-snap-align: start;
        }

        .app-item {
            display: flex; align-items: center; gap: 15px;
            text-decoration: none; color: inherit;
        }
        .app-item:active { opacity: 0.6; }

        .app-icon {
            width: 62px; height: 62px; border-radius: 14px;
            object-fit: cover; border: 0.5px solid var(--line);
        }
        .app-info {
            flex: 1; border-bottom: 0.5px solid var(--line);
            padding: 2px 0 14px; display: flex; align-items: center; justify-content: space-between;
            min-width: 0; /* 文字省略のために必要 */
        }
        .app-column .app-item:last-child .app-info { border-bottom: none; }
        
        .app-text { display: flex; flex-direction: column; min-width: 0; padding-right: 10px; }
        .app-title { 
            font-size: 1.05rem; font-weight: 600; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .app-subtitle { 
            font-size: 0.85rem; color: var(--secondary-text); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        .get-btn {
            background: var(--btn-bg); color: var(--btn-blue);
            padding: 6px 0; width: 74px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 800; text-align: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="javascript:history.back()" class="back-btn">Back</a>
    </nav>

    <div class="container">
        <header class="dev-header">
            <h1 class="dev-name" id="js-dev-name">Loading...</h1>
        </header>

        <section>
            <div class="section-title">
                <h2>Games</h2>
            </div>
            <div id="js-app-list" class="app-scroll-container">
                </div>
        </section>
    </div>

    <script>
        async function initDevPage() {
            try {
                // 同じフォルダにある data.json を読み込み
                const response = await fetch(`./data.json?${new Date().getTime()}`);
                const data = await response.json();

                // ページタイトルの設定
                document.title = `${data.displayName} - Developer Profile`;
                document.getElementById('js-dev-name').textContent = data.displayName;
                
                const listContainer = document.getElementById('js-app-list');
                const apps = data.apps;
                let currentColumn;

                apps.forEach((app, index) => {
                    // 1. 3つごとに新しいカラム（縦列）を作成
                    if (index % 3 === 0) {
                        currentColumn = document.createElement('div');
                        currentColumn.className = 'app-column';
                        listContainer.appendChild(currentColumn);
                    }

                    // 2. リンク先の決定 (online/offline/prod)
                    const mode = app.mode || 'prod';
                    const targetUrl = `../../mods/${mode}/${app.id}/index.html`;

                    // 3. アプリ項目のHTML生成
                    const appLink = document.createElement('a');
                    appLink.href = targetUrl;
                    appLink.className = 'app-item';
                    appLink.innerHTML = `
                        <img src="../../../resources/${app.id}/icon.png" class="app-icon" alt="${app.name} icon">
                        <div class="app-info">
                            <div class="app-text">
                                <span class="app-title">${app.name}</span>
                                <span class="app-subtitle">${app.subtitle}</span>
                            </div>
                            <div class="get-btn">GET</div>
                        </div>
                    `;
                    
                    currentColumn.appendChild(appLink);
                });

            } catch (e) {
                console.error("データの読み込みに失敗しました:", e);
                document.getElementById('js-dev-name').textContent = "Developer Name";
            }
        }

        window.onload = initDevPage;
    </script>
</body>
</html>
