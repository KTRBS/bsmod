<!DOCTYPE html>
<html lang="ja">
<head>
    <script>
        const config = { isDebug: true };
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title id="js-meta-title">Brawl stars mods</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #ffffff; --text-color: #000000; --secondary-text: #8e8e93;
            --grad-color: rgba(255,255,255,1); --header-bg: rgba(255,255,255,0.85);
            --btn-blue: #007aff; --line: rgba(0,0,0,0.1); --card-bg: #f2f2f7;
            --btn-gray: #f0f0f7; --status-green: #28a745; --menu-bg: #ffffff;
            --btn-disabled: #cccccc;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000; --text-color: #ffffff; --secondary-text: #8e8e93;
                --grad-color: rgba(0,0,0,1); --header-bg: rgba(20,20,20,0.85);
                --line: rgba(255,255,255,0.15); --card-bg: #1c1c1e;
                --btn-gray: #2c2c2e; --menu-bg: #2c2c2e;
                --btn-disabled: #444444;
            }
        }
        body { font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-color); line-height: 1.4; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        #debug-lang-tool { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 9999; background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); }

        .top-btn { position: absolute; top: 20px; z-index: 50; width: 32px; height: 32px; background: rgba(255,255,255,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; left: 20px; text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .back-icon { width: 10px; height: 10px; border-left: 2.5px solid var(--btn-blue); border-bottom: 2.5px solid var(--btn-blue); transform: rotate(45deg); margin-left: 4px; }
        
        .sticky-header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: var(--header-bg); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100; transform: translateY(-100%); transition: 0.3s; opacity: 0; border-bottom: 0.5px solid var(--line); }
        .sticky-header.active { transform: translateY(0); opacity: 1; }

        .hero { position: relative; height: 220px; background: center/cover no-repeat; display: flex; align-items: flex-end; }
        .hero::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to bottom, rgba(0,0,0,0), var(--bg-color)); }
        
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        .info-header { display: flex; align-items: center; gap: 18px; margin-bottom: 25px; }
        .icon-box img { width: 92px; height: 92px; border-radius: 20px; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .version-wrapper { display: flex; align-items: center; gap: 6px; position: relative; }
        .version-num { font-size: 1.4rem; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        
        .old-ver-toggle { background: none; border: none; color: var(--btn-blue); font-size: 1.2rem; cursor: pointer; padding: 4px; display: none; align-items: center; }
        .old-ver-menu { position: absolute; top: 100%; left: 0; background: var(--menu-bg); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); display: none; z-index: 120; min-width: 180px; margin-top: 8px; overflow-y: auto; max-height: 250px; }
        .old-ver-menu.show { display: block; }
        .old-ver-item { display: block; padding: 12px 16px; text-decoration: none; color: var(--text-color); font-size: 0.95rem; border-bottom: 0.5px solid var(--line); font-weight: 500; }

        .status-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: 700; text-transform: uppercase; background: var(--status-green); color: white; }

        .download-btn { display: block; background: var(--btn-blue); color: white !important; text-decoration: none; text-align: center; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 1.05rem; margin-bottom: 10px; }
        .download-btn.disabled { background: var(--btn-disabled); pointer-events: none; }

        .ss-container { display: flex; overflow-x: auto; gap: 14px; margin: 15px -20px 25px; padding: 0 20px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .ss-container::-webkit-scrollbar { display: none; }
        .ss-container img { flex: 0 0 85%; max-width: 380px; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; border: 0.5px solid var(--line); }

        .store-section { margin-top: 15px; border-top: 0.5px solid var(--line); padding-top: 10px; }
        .section-title { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }

        /* 横スクロールUI（前バージョン戻し） */
        .app-list-scroll { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .app-list-scroll::-webkit-scrollbar { display: none; }
        .app-column { display: flex; flex-direction: column; min-width: 82vw; max-width: 460px; }
        .app-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--line); text-decoration: none; color: inherit; }
        .app-row:last-child { border-bottom: none; }
        .app-row img { width: 56px; height: 56px; border-radius: 12px; margin-right: 12px; object-fit: cover; }
        .app-info { flex: 1; min-width: 0; }
        .app-name { font-size: 0.95rem; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-desc { font-size: 0.78rem; color: var(--secondary-text); margin: 1px 0 0; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .get-small-btn { background: var(--btn-gray); color: var(--btn-blue); padding: 5px 18px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; }

        .info-content { line-height: 1.6; color: var(--secondary-text); font-size: 0.92rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="debug-container"></div>
    <a href="javascript:history.back()" class="top-btn"><div class="back-icon"></div></a>

    <div id="js-sticky-header" class="sticky-header">
        <div style="display:flex;align-items:center;gap:10px;">
            <img id="js-sticky-icon" src="" style="width:30px;height:30px;border-radius:7px;">
            <span id="js-sticky-name" style="font-weight:700;font-size:0.95rem;">---</span>
        </div>
        <a href="#" class="sticky-dl-btn" id="js-sticky-dl-btn" style="background:var(--btn-gray);color:var(--btn-blue);padding:5px 16px;border-radius:20px;text-decoration:none;font-weight:800;font-size:0.8rem;">GET</a>
    </div>

    <section class="hero" id="js-hero"></section>

    <div class="container">
        <div class="info-header">
            <div class="icon-box"><img id="js-main-icon" src="" alt=""></div>
            <div>
                <div class="version-wrapper">
                    <p class="version-num" id="js-version">v---</p>
                    <button id="js-old-ver-toggle" class="old-ver-toggle">▽</button>
                    <div id="js-old-ver-menu" class="old-ver-menu"></div>
                    <span id="js-status" class="status-badge">Available</span>
                </div>
                <div id="js-author-list" style="margin-top:4px; font-weight: 600; font-size: 0.85rem; color: var(--btn-blue);"></div>
                <p style="font-size: 0.75rem; margin: 4px 0 0; color: var(--secondary-text);" id="ui-updated">---</p>
            </div>
        </div>

        <div id="js-dl-area"></div>
        <div class="ss-container" id="js-ss-container"></div>
        
        <h2 style="font-size: 1.1rem; font-weight: 800; margin-bottom: 8px;">Information</h2>
        <div id="js-info-content" class="info-content">Loading...</div>

        <div id="js-sns-area" style="margin-bottom: 25px;"></div>

        <div id="js-more-by-section" class="store-section" style="display:none;">
            <div class="section-title" id="js-more-by-title">---</div>
            <div class="app-list-scroll" id="js-more-by-list"></div>
        </div>

        <div id="js-suggested-section" class="store-section" style="display:none;">
            <div class="section-title" id="js-suggested-title">---</div>
            <div class="app-list-scroll" id="js-suggested-list"></div>
        </div>

        <div style="height:50px;"></div>
    </div>

    <script>
        let currentLang = navigator.language.includes('ja') ? 'ja' : 'en';
        const params = new URLSearchParams(window.location.search);
        const codename = params.get('id');

        let cachedVData = null;
        let cachedAppDetails = null;

        const uiText = {
            ja: { available: "利用可能", updated: "最終更新: ", download: "ダウンロード", unsupported: "非対応", moreBy: "{name}の他のアプリ", suggested: "おすすめ", get: "入手" },
            en: { available: "Available", updated: "Last Updated: ", download: "DOWNLOAD", unsupported: "Unsupported", moreBy: "More by {name}", suggested: "You Might Also Like", get: "Get" }
        };

        if (config.isDebug) {
            const btn = document.createElement('div');
            btn.id = 'debug-lang-tool';
            btn.textContent = `Lang: ${currentLang.toUpperCase()}`;
            btn.onclick = () => { 
                currentLang = (currentLang === 'ja') ? 'en' : 'ja'; 
                btn.textContent = `Lang: ${currentLang.toUpperCase()}`;
                updateDisplay(); 
            };
            document.getElementById('debug-container').appendChild(btn);
        }

        function getOS() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return "android";
            if (/iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) return "ios";
            return "pc";
        }

        // 表示の更新（fetchなしで瞬時に切り替え）
        async function updateDisplay() {
            if(!cachedVData) return;
            const t = uiText[currentLang];
            const device = getOS();
            const resDir = `../resources/${codename}`;
            const vData = cachedVData;

            document.getElementById('ui-updated').textContent = t.updated + vData.lastUpdated;
            document.getElementById('js-status').textContent = t.available;

            // ボタン制御
            const finalUrl = (device === "ios") ? vData.iosDownloadUrl : vData.androidDownloadUrl;
            const isDisabled = !finalUrl;
            document.getElementById('js-dl-area').innerHTML = `<a class="download-btn ${isDisabled?'disabled':''}" href="${finalUrl || '#'}" target="_blank">${isDisabled ? t.unsupported : t.download}</a>`;
            
            const stickyDlBtn = document.getElementById('js-sticky-dl-btn');
            if (isDisabled) {
                stickyDlBtn.style.display = 'none';
            } else {
                stickyDlBtn.style.display = 'block';
                stickyDlBtn.href = finalUrl;
                stickyDlBtn.textContent = t.get;
            }

            // Information読込（これのみ外部HTMLのためfetch）
            const infoPath = `${resDir}/info_${currentLang}_${device}.html`;
            fetch(infoPath).then(r => r.ok ? r.text() : fetch(`${resDir}/info_${currentLang}.html`).then(r2 => r2.text()))
                .then(html => document.getElementById('js-info-content').innerHTML = html)
                .catch(() => document.getElementById('js-info-content').innerHTML = "No Information.");

            // リスト更新
            if (cachedAppDetails) {
                const primaryAuthor = vData.authors[0];
                const authorApps = [];
                const otherApps = [];

                cachedAppDetails.forEach(item => {
                    const isAuthor = item.res.authors?.some(au => au.id === primaryAuthor.id);
                    const data = { id: item.id, name: item.res.name, desc: item.res.meta?.[currentLang]?.desc || item.res.meta?.en?.desc || "" };
                    if (isAuthor) authorApps.push(data); else otherApps.push(data);
                });

                const renderScrollList = (container, list) => {
                    let html = '';
                    for (let i = 0; i < list.length; i += 2) {
                        html += '<div class="app-column">';
                        for (let j = 0; j < 2; j++) {
                            const a = list[i + j];
                            if (!a) break;
                            html += `<a href="?id=${a.id}" class="app-row"><img src="../resources/${a.id}/icon.png" loading="lazy"><div class="app-info"><div class="app-name">${a.name}</div><div class="app-desc">${a.desc}</div></div><div class="get-small-btn">${t.get}</div></a>`;
                        }
                        html += '</div>';
                    }
                    container.innerHTML = html;
                };

                if (authorApps.length) {
                    renderScrollList(document.getElementById('js-more-by-list'), authorApps);
                    document.getElementById('js-more-by-section').style.display = 'block';
                    document.getElementById('js-more-by-title').textContent = t.moreBy.replace('{name}', primaryAuthor.name);
                }
                if (otherApps.length) {
                    renderScrollList(document.getElementById('js-suggested-list'), otherApps);
                    document.getElementById('js-suggested-section').style.display = 'block';
                    document.getElementById('js-suggested-title').textContent = t.suggested;
                }
            }
        }

        // 初回データ取得
        async function initPage() {
            if(!codename) return;
            const resDir = `../resources/${codename}`;
            
            try {
                cachedVData = await fetch(`${resDir}/version.json?${Date.now()}`).then(r => r.json());
                
                document.getElementById('js-sticky-name').textContent = cachedVData.name;
                document.getElementById('js-sticky-icon').src = `${resDir}/icon.png`;
                document.getElementById('js-main-icon').src = `${resDir}/icon.png`;
                document.getElementById('js-hero').style.backgroundImage = `url('${resDir}/header.png')`;
                document.getElementById('js-version').textContent = cachedVData.version;
                document.getElementById('js-author-list').innerHTML = cachedVData.authors.map(a => `<a href="../dev/?id=${a.id}" style="color:inherit;text-decoration:none;">${a.name}</a>`).join(', ');

                // SNSボタン描画
                const snsArea = document.getElementById('js-sns-area');
                if (cachedVData.discord) snsArea.innerHTML += `<a href="${cachedVData.discord}" target="_blank" class="download-btn" style="background:#5865F2;">Discord</a>`;
                if (cachedVData.telegram) snsArea.innerHTML += `<a href="${cachedVData.telegram}" target="_blank" class="download-btn" style="background:#0088cc;">Telegram</a>`;
                
                // 旧バージョンメニュー
                const menu = document.getElementById('js-old-ver-menu');
                if(cachedVData.oldVersions?.length) {
                    cachedVData.oldVersions.forEach(ov => menu.insertAdjacentHTML('beforeend', `<a class="old-ver-item" href="${ov.url}">${ov.version}</a>`));
                    document.getElementById('js-old-ver-toggle').style.display = 'flex';
                }

                // スクショ
                const ssc = document.getElementById('js-ss-container');
                [1,2,3].forEach(n => {
                    const img = document.createElement('img');
                    img.src = `${resDir}/ss${n}.png`;
                    img.onerror = () => img.remove();
                    ssc.appendChild(img);
                });

                updateDisplay();

                // おすすめリスト用データをバックグラウンドで取得
                const [apps, prods] = await Promise.all([
                    fetch(`../apps.json`).then(r => r.json()).catch(() => []),
                    fetch(`../prod.json`).then(r => r.json()).catch(() => [])
                ]);
                const combined = [...apps, ...prods].filter(a => (a.id || a.codename) !== codename);
                cachedAppDetails = (await Promise.all(combined.map(async (app) => {
                    const id = app.id || app.codename;
                    try { return { id, res: await fetch(`../resources/${id}/version.json`).then(r => r.json()) }; } catch(e) { return null; }
                }))).filter(d => d !== null);

                updateDisplay();

            } catch (e) { console.error(e); }
        }

        document.getElementById('js-old-ver-toggle').onclick = (e) => { e.stopPropagation(); document.getElementById('js-old-ver-menu').classList.toggle('show'); };
        window.onclick = () => document.getElementById('js-old-ver-menu').classList.remove('show');
        window.onscroll = () => {
            const h = document.getElementById('js-sticky-header');
            if (window.scrollY > 150) h.classList.add('active'); else h.classList.remove('active');
        };
        window.onload = initPage;
    </script>
</body>
</html>
