<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Details</title>
    
    <style>
        :root {
            --bg-color: #ffffff; --text-color: #000000; --secondary-text: #8e8e93;
            --btn-blue: #007aff; --line: rgba(0,0,0,0.1); --card-bg: #f2f2f7;
            --nav-bg: rgba(255,255,255,0.8); --status-green: #28a745; --status-gray: #8e8e93;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000; --text-color: #ffffff; --secondary-text: #8e8e93;
                --line: rgba(255,255,255,0.15); --card-bg: #1c1c1e;
                --nav-bg: rgba(0,0,0,0.7);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            overflow-x: hidden; -webkit-tap-highlight-color: transparent; line-height: 1.4;
        }

        /* --- Navigation (Sticky) --- */
        .nav-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 15px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 0.5px solid transparent; transition: border-color 0.3s;
        }
        .nav-bar.scrolled { border-bottom-color: var(--line); }

        .back-btn {
            text-decoration: none; color: var(--btn-blue);
            font-size: 1.1rem; font-weight: 500; display: flex; align-items: center;
        }
        .back-btn::before {
            content: ''; display: inline-block; width: 10px; height: 10px;
            border-left: 2.5px solid var(--btn-blue); border-bottom: 2.5px solid var(--btn-blue);
            transform: rotate(45deg); margin-right: 8px;
        }

        .nav-title {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-weight: 600; font-size: 1.05rem; opacity: 0;
            transition: opacity 0.2s, transform 0.2s; white-space: nowrap;
        }
        .nav-title.visible { opacity: 1; }

        /* --- Hero / Header --- */
        .hero {
            position: relative; height: 240px; background-position: center; background-size: cover;
            display: flex; align-items: flex-end; margin-top: 0;
        }
        .hero::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 100px;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, var(--bg-color) 100%);
        }
        .mod-name-hero {
            position: relative; z-index: 10; font-size: 2.2rem; font-weight: 800;
            margin: 0 0 20px 20px; letter-spacing: -1px; transition: opacity 0.1s;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 0 20px 40px; }

        /* --- Info Section --- */
        .info-header { display: flex; align-items: center; gap: 18px; margin-bottom: 25px; }
        .icon-box img { width: 92px; height: 92px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .version-num { font-size: 1.4rem; font-weight: 700; margin: 0; }
        
        .status-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: 700; color: white !important; }
        .status-available { background: var(--status-green) !important; }
        .status-outdated { background: var(--status-gray) !important; }

        .author-link { color: var(--btn-blue) !important; text-decoration: none; font-weight: 600; font-size: 0.85rem; }

        .download-btn {
            display: block; background: var(--btn-blue); color: white !important; text-decoration: none;
            text-align: center; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 1.05rem; margin-bottom: 30px;
        }
        .download-btn.unsupported { background: var(--status-gray) !important; opacity: 0.8; cursor: not-allowed; }

        .ss-container { display: flex; overflow-x: auto; gap: 14px; margin: 0 -20px 30px -20px; padding: 0 20px; scroll-snap-type: x mandatory; }
        .ss-container::-webkit-scrollbar { display: none; }
        .ss-container img { flex: 0 0 85%; max-width: 380px; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; scroll-snap-align: center; border: 0.5px solid var(--line); }

        .section-title { font-size: 1.2rem; font-weight: 700; border-bottom: 1px solid var(--line); padding-bottom: 10px; margin-bottom: 15px; }
        .content-body { line-height: 1.6; color: var(--secondary-text); font-size: 1rem; }
    </style>
</head>
<body>

    <nav class="nav-bar" id="js-nav-bar">
        <a href="javascript:history.back()" class="back-btn">Back</a>
        <span class="nav-title" id="js-nav-title">---</span>
        <div style="width:50px;"></div>
    </nav>

    <section id="js-hero" class="hero">
        <div class="mod-name-hero" id="js-large-title">---</div>
    </section>

    <div class="container">
        <div class="info-header">
            <div class="icon-box"><img id="js-icon" src="" alt=""></div>
            <div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <p class="version-num" id="js-version">v---</p>
                    <div id="js-status" class="status-badge">----</div>
                </div>
                <div style="margin-top:4px; font-size:0.85rem;">
                    <span style="color:var(--secondary-text)">Developer: </span>
                    <span id="js-author-list"></span>
                </div>
                <p style="font-size: 0.75rem; margin: 4px 0 0; color: var(--secondary-text);" id="js-updated">--</p>
            </div>
        </div>

        <div id="js-dl-area"></div>
        <div class="ss-container" id="js-ss-container"></div>

        <h2 class="section-title">How to Install</h2>
        <div class="content-body" id="js-info-content">Loading...</div>
    </div>

    <script>
        const isJa = navigator.language.includes('ja');
        const lang = isJa ? 'ja' : 'en';
        const codename = new URLSearchParams(window.location.search).get('id');

        function getOS() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return "android";
            if (/iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) return "ios";
            return "pc";
        }

        async function initPage() {
            if (!codename) return;
            const resDir = `../resources/${codename}`;
            const t = isJa ? { dl:"ダウンロード", un:"非対応", av:"利用可能" } : { dl:"DOWNLOAD", un:"Unsupported", av:"Available" };

            try {
                const res = await fetch(`${resDir}/version.json?${Date.now()}`);
                const data = await res.json();

                // UI Data Fill
                document.title = data.name;
                document.getElementById('js-large-title').textContent = data.name;
                document.getElementById('js-nav-title').textContent = data.name;
                document.getElementById('js-hero').style.backgroundImage = `url('${resDir}/header.png')`;
                document.getElementById('js-icon').src = `${resDir}/icon.png`;
                document.getElementById('js-version').textContent = 'v' + data.version;
                document.getElementById('js-updated').textContent = 'Last Updated: ' + data.lastUpdated;

                // Status & Compatibility
                const os = getOS();
                const isComp = (os === "ios" ? data.iossupport === "available" : (os === "android" ? data.androidsupport === "available" : true));
                const statusEl = document.getElementById('js-status');
                statusEl.textContent = isComp ? t.av : t.un;
                statusEl.className = 'status-badge ' + (isComp ? 'status-available' : 'status-outdated');

                // Authors
                const authArea = document.getElementById('js-author-list');
                data.authors.forEach((a, i) => {
                    const link = document.createElement('a');
                    link.href = `../dev/?id=${a.id}`;
                    link.className = 'author-link';
                    link.textContent = a.name + (i < data.authors.length - 1 ? ', ' : '');
                    authArea.appendChild(link);
                });

                // Download Button
                const dlUrl = (os === "ios") ? data.iosDownloadUrl : data.androidDownloadUrl;
                const btn = document.createElement('a');
                btn.className = "download-btn" + (isComp ? "" : " unsupported");
                btn.textContent = isComp ? `${t.dl} (${os.toUpperCase()})` : t.un;
                if (isComp) { btn.href = dlUrl; btn.target = "_blank"; }
                document.getElementById('js-dl-area').appendChild(btn);

                // Screenshots
                const ssContainer = document.getElementById('js-ss-container');
                [1,2,3].forEach(n => {
                    const img = document.createElement('img');
                    img.src = `${resDir}/ss${n}.png`;
                    ssContainer.appendChild(img);
                });

                // Info Content
                const infoRes = await fetch(`${resDir}/info_${lang}.html`);
                if (infoRes.ok) document.getElementById('js-info-content').innerHTML = await infoRes.text();

                // --- iOS Scroll Logic ---
                const navBar = document.getElementById('js-nav-bar');
                const navTitle = document.getElementById('js-nav-title');
                const largeTitle = document.getElementById('js-large-title');

                window.addEventListener('scroll', () => {
                    const scrollPos = window.scrollY;
                    
                    // 150px程度スクロールしたらナビバーをアクティブにする
                    if (scrollPos > 160) {
                        navTitle.classList.add('visible');
                        navBar.classList.add('scrolled');
                    } else {
                        navTitle.classList.remove('visible');
                        navBar.classList.remove('scrolled');
                    }

                    // 大きいタイトルを徐々に透明にする
                    if (scrollPos > 0) {
                        largeTitle.style.opacity = Math.max(0, 1 - (scrollPos / 140));
                    } else {
                        largeTitle.style.opacity = 1;
                    }
                }, { passive: true });

            } catch (e) { console.error(e); }
        }
        window.onload = initPage;
    </script>
</body>
</html>
