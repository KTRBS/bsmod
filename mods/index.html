<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title id="js-meta-title">App Store Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #ffffff; --text-color: #000000; --secondary-text: #8e8e93;
            --btn-blue: #007aff; --line: rgba(0,0,0,0.1); --card-bg: #f2f2f7;
            --btn-gray: #f0f0f7;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000; --text-color: #ffffff; --secondary-text: #8e8e93;
                --line: rgba(255,255,255,0.15); --card-bg: #1c1c1e;
                --btn-gray: #1c1c1e;
            }
        }
        body { 
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; background-color: var(--bg-color); color: var(--text-color); 
            line-height: 1.4; -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* セクション設定 */
        .store-section { margin-top: 40px; border-top: 0.5px solid var(--line); padding-top: 20px; }
        .section-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 15px; text-decoration: none; color: inherit;
        }
        .section-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
        .section-arrow { color: var(--secondary-text); font-size: 1.2rem; font-weight: 300; margin-left: 5px; }

        /* 横スクロール & 2段組みの魔法 */
        .app-list-scroll {
            display: grid;
            grid-template-rows: repeat(2, 1fr); /* 2行にする */
            grid-auto-flow: column; /* 横に流す */
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 0 20px;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .app-list-scroll::-webkit-scrollbar { display: none; }

        /* アプリ行のスタイル */
        .app-row {
            display: flex; align-items: center; width: 85vw; max-width: 500px;
            padding: 10px 0; border-bottom: 0.5px solid var(--line);
            scroll-snap-align: start; text-decoration: none; color: inherit;
        }
        .app-row:nth-child(2n) { border-bottom: none; } /* 2段目の下の線は消す */

        .app-icon { width: 64px; height: 64px; border-radius: 14px; object-fit: cover; margin-right: 15px; border: 0.5px solid var(--line); }
        
        .app-info { flex: 1; min-width: 0; }
        .app-name { font-size: 1.05rem; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-desc { font-size: 0.85rem; color: var(--secondary-text); margin: 2px 0 0; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

        .get-btn {
            background: var(--btn-gray); color: var(--btn-blue);
            padding: 6px 24px; border-radius: 20px; font-weight: 800; font-size: 0.9rem;
            text-transform: uppercase; margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="js-more-by-section" class="store-section" style="display:none;">
        <a href="#" class="section-header">
            <span class="section-title" id="js-more-by-title">More by ---</span>
            <span class="section-arrow">›</span>
        </a>
        <div class="app-list-scroll" id="js-more-by-list"></div>
    </div>

    <div id="js-suggested-section" class="store-section" style="display:none;">
        <a href="#" class="section-header">
            <span class="section-title" id="js-suggested-title">You Might Also Like</span>
            <span class="section-arrow">›</span>
        </a>
        <div class="app-list-scroll" id="js-suggested-list"></div>
    </div>
</div>

<script>
    const isJa = navigator.language.includes('ja');
    const lang = isJa ? 'ja' : 'en';
    const params = new URLSearchParams(window.location.search);
    const codename = params.get('id');

    const uiText = {
        ja: { moreBy: "{name}の他のアプリ", suggested: "おすすめ", get: "入手" },
        en: { moreBy: "More by {name}", suggested: "You Might Also Like", get: "Get" }
    };

    async function initRecommendations() {
        if(!codename) return;
        const t = uiText[lang];

        try {
            // 自アプリの作者情報を取得
            const meRes = await fetch(`../resources/${codename}/version.json`);
            const meData = await meRes.json();
            const primaryAuthor = meData.authors[0];

            // リスト読み込み
            const [appsData, prodData] = await Promise.all([
                fetch('../apps.json').then(r => r.json()).catch(() => []),
                fetch('../prod.json').then(r => r.json()).catch(() => [])
            ]);

            const combined = [...appsData, ...prodData];
            const seenIds = new Set([codename]);
            const uniqueApps = [];

            combined.forEach(app => {
                const id = app.id || app.codename;
                if (id && !seenIds.has(id)) {
                    seenIds.add(id);
                    uniqueApps.push({ id, name: app.name });
                }
            });

            const moreByList = document.getElementById('js-more-by-list');
            const suggestedList = document.getElementById('js-suggested-list');

            const tasks = uniqueApps.map(async (app) => {
                try {
                    const itemRes = await fetch(`../resources/${app.id}/version.json`);
                    if (!itemRes.ok) throw 1;
                    const itemData = await itemRes.json();

                    // 言語別の説明文を取得
                    const description = (itemData.meta && itemData.meta[lang]) 
                                        ? itemData.meta[lang].desc 
                                        : (itemData.meta && itemData.meta['en'] ? itemData.meta['en'].desc : "");

                    const appHtml = `
                        <a href="?id=${app.id}" class="app-row">
                            <img src="../resources/${app.id}/icon.png" class="app-icon">
                            <div class="app-info">
                                <p class="app-name">${itemData.name}</p>
                                <p class="app-desc">${description}</p>
                            </div>
                            <div class="get-btn">${t.get}</div>
                        </a>
                    `;

                    const isSameAuthor = itemData.authors && itemData.authors.some(a => a.id === primaryAuthor.id);
                    if (isSameAuthor) {
                        moreByList.insertAdjacentHTML('beforeend', appHtml);
                    } else {
                        suggestedList.insertAdjacentHTML('beforeend', appHtml);
                    }
                } catch(e) {}
            });

            await Promise.all(tasks);

            if (moreByList.children.length > 0) {
                document.getElementById('js-more-by-section').style.display = 'block';
                document.getElementById('js-more-by-title').textContent = t.moreBy.replace('{name}', primaryAuthor.name);
            }
            if (suggestedList.children.length > 0) {
                document.getElementById('js-suggested-section').style.display = 'block';
                document.getElementById('js-suggested-title').textContent = t.suggested;
            }

        } catch (e) { console.error(e); }
    }

    window.onload = initRecommendations;
</script>
</body>
</html>
