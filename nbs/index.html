<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NBS Offline - Details</title>
    
    <meta id="meta-desc" property="og:description" content="NBS Offline 最新版をダウンロード">
    <meta id="og-title" property="og:title" content="NBS Offline - Details">
    <meta property="og:image" content="https://KTRBS.github.io/resources/nbs/icon.png">
    <meta property="og:url" content="https://KTRBS.github.io/resources/nbs">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Brawl Stars Mods">

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333;
            --secondary-text: #666;
            --grad-color: rgba(255,255,255,1);
            --header-bg: rgba(255,255,255,0.9);
            --btn-blue: #007aff; /* Offline Mod用に青系を基調に */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #f0f0f0;
                --secondary-text: #bbb;
                --grad-color: rgba(18,18,18,1);
                --header-bg: rgba(18,18,18,0.9);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Sticky Header --- */
        .sticky-header {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px; background: var(--header-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            opacity: 0;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        @media (prefers-color-scheme: dark) { .sticky-header { border-bottom: 0.5px solid rgba(255,255,255,0.1); } }
        .sticky-header.active { transform: translateY(0); opacity: 1; }
        
        .sticky-info { display: flex; align-items: center; gap: 10px; }
        .sticky-info img { width: 34px; height: 34px; border-radius: 8px; }
        .sticky-info span { font-weight: 700; font-size: 1rem; }
        
        .sticky-dl-btn {
            background: #f0f0f7; color: var(--btn-blue); text-decoration: none;
            padding: 6px 16px; border-radius: 20px; font-weight: 800; font-size: 0.8rem;
        }
        @media (prefers-color-scheme: dark) { .sticky-dl-btn { background: #3a3a3c; } }

        /* --- Hero Section --- */
        .hero {
            position: relative; height: 240px;
            background: url('../../resources/nbs/header.png') center/cover no-repeat;
            display: flex; align-items: flex-end;
            overflow: hidden;
        }
        .hero::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 100px;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, var(--grad-color) 100%);
        }
        
        .mod-name-hero {
            position: relative; z-index: 10; font-size: 2.2rem; font-weight: 800;
            margin: 0 0 20px 20px; letter-spacing: -1px;
            will-change: transform, opacity;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        .info-header { display: flex; align-items: center; gap: 18px; margin-bottom: 25px; }
        .icon-box img { width: 92px; height: 92px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .version-num { font-size: 1.4rem; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; margin-top: 8px; text-transform: uppercase; }
        .status-available { background: #28a745; color: white; }
        .status-outdated { background: #dc3545; color: white; }

        .download-btn {
            display: block; background: var(--btn-blue); color: white; text-decoration: none;
            text-align: center; padding: 16px; border-radius: 14px; font-weight: 800; font-size: 1.1rem;
            margin-bottom: 30px; transition: transform 0.1s;
        }
        .download-btn:active { transform: scale(0.98); }

        /* --- Screenshots --- */
        .ss-container {
            display: flex; overflow-x: auto; gap: 14px; margin: 0 -20px 30px -20px; padding: 0 20px;
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        }
        .ss-container::-webkit-scrollbar { display: none; }
        .ss-container img {
            flex: 0 0 85%; max-width: 380px; aspect-ratio: 16 / 9;
            object-fit: cover; border-radius: 12px; scroll-snap-align: center;
            border: 0.5px solid var(--line);
        }

        .section-title { font-size: 1.2rem; font-weight: 800; border-bottom: 1px solid var(--line); padding-bottom: 10px; margin-bottom: 15px; }
        .content-body { line-height: 1.6; color: var(--secondary-text); font-size: 1rem; }
        .back-link { display: inline-block; margin: 40px 0; color: var(--btn-blue); text-decoration: none; font-weight: 700; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div id="js-sticky-header" class="sticky-header">
        <div class="sticky-info">
            <img src="../../resources/nbs/icon.png" alt="Icon">
            <span>NBS Offline</span>
        </div>
        <a href="#" class="sticky-dl-btn js-dl-link">GET</a>
    </div>

    <section class="hero">
        <div class="mod-name-hero" id="ui-main-title">NBS Offline</div>
    </section>

    <div class="container">
        <div class="info-header">
            <div class="icon-box"><img src="../../resources/nbs/icon.png" alt="Icon"></div>
            <div>
                <p class="version-num" id="js-version">v---</p>
                <div id="js-status" class="status-badge">----</div>
                <p style="font-size: 0.85rem; margin: 8px 0 0; color: var(--secondary-text);" id="ui-updated">Last Updated: --</p>
            </div>
        </div>

        <a href="#" class="download-btn js-dl-link" id="ui-download">DOWNLOAD</a>

        <div class="ss-container">
            <img src="../../resources/nbs/ss1.png" alt="SS1">
            <img src="../../resources/nbs/ss2.png" alt="SS2">
            <img src="../../resources/nbs/ss3.png" alt="SS3">
        </div>

        <h2 class="section-title" id="ui-howto-title">How to Install</h2>
        <div class="content-body" id="js-info-content">Loading description...</div>

        <a href="../../index.html" class="back-link" id="ui-back">← Back to List</a>
    </div>

    <script>
        const isJa = navigator.language.includes('ja');
        const lang = isJa ? 'ja' : 'en';
        const codename = 'nbs'; // 今回のターゲット

        const uiText = {
            ja: { 
                title: "NBS Offline - 詳細", 
                updated: "最終更新: ", 
                howto: "導入方法", 
                back: "← リストに戻る", 
                download: "ダウンロード", 
                available: "利用可能", 
                outdated: "旧バージョン", 
                get: "入手" 
            },
            en: { 
                title: "NBS Offline - Details", 
                updated: "Last Updated: ", 
                howto: "How to Install", 
                back: "← Back to List", 
                download: "DOWNLOAD", 
                available: "Available", 
                outdated: "Outdated", 
                get: "GET" 
            }
        };

        async function initPage() {
            const ts = new Date().getTime();
            const t = uiText[lang];

            document.title = t.title;
            document.getElementById('ui-updated').firstChild.textContent = t.updated;
            document.getElementById('ui-howto-title').textContent = t.howto;
            document.getElementById('ui-back').textContent = t.back;
            document.getElementById('ui-download').textContent = t.download;
            document.querySelector('.sticky-dl-btn').textContent = t.get;

            try {
                // version.jsonの取得
                const vRes = await fetch(`../../resources/${codename}/version.json?${ts}`);
                const vData = await vRes.json();
                
                document.getElementById('js-version').textContent = 'v' + vData.version.toString().replace(/^[vV]+/, "");
                document.getElementById('ui-updated').innerHTML = `<span>${t.updated}</span>${vData.lastUpdated}`;
                
                const statusEl = document.getElementById('js-status');
                const rawStatus = vData.status.toLowerCase();
                statusEl.textContent = rawStatus === 'available' ? t.available : t.outdated;
                statusEl.className = 'status-badge ' + (rawStatus === 'available' ? 'status-available' : 'status-outdated');

                const dlLinks = document.querySelectorAll('.js-dl-link');
                dlLinks.forEach(link => {
                    if (vData.downloadUrl) { 
                        link.href = vData.downloadUrl; 
                        link.target = "_blank"; 
                    }
                });

                // 紹介・手順文の取得
                const infoFile = isJa ? 'info_ja.html' : 'info_en.html';
                const infoRes = await fetch(`../../resources/${codename}/${infoFile}?${ts}`);
                if(infoRes.ok) {
                    document.getElementById('js-info-content').innerHTML = await infoRes.text();
                }

            } catch (e) { console.error("Load failed:", e); }

            // スクロール時のヘッダーアニメーション
            const stickyHeader = document.getElementById('js-sticky-header');
            const mainTitle = document.getElementById('ui-main-title');
            
            window.addEventListener('scroll', () => {
                const scrollY = window.scrollY;
                const end = 150;
                
                // ヒーロータイトルのフェードアウト
                let opacity = 1 - (scrollY / end);
                if (opacity < 0) opacity = 0;
                mainTitle.style.opacity = opacity;
                mainTitle.style.transform = `translateY(${scrollY * -0.3}px)`;

                // スティッキーヘッダー表示
                if (scrollY > end) {
                    stickyHeader.classList.add('active');
                } else {
                    stickyHeader.classList.remove('active');
                }
            }, { passive: true });
        }

        window.onload = initPage;
    </script>
</body>
</html>
