<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tale Stars - 詳細情報</title>
    <style>
        :root {
            --primary-green: #28a745;
            --bg-white: #ffffff;
            --text-main: #333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-white);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* ヘッダー画像とグラデーション背景 */
        .hero-section {
            position: relative;
            height: 250px;
            background: url('../resources/tale/header.png') center/cover no-repeat; /* ヘッダー画像 */
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        /* 下に向かって白くなるグラデーション */
        .hero-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 100%);
        }

        .mod-name {
            position: relative;
            z-index: 10;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        /* アイコンと情報の横並び */
        .info-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .icon-box img {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .info-meta {
            text-align: left;
        }

        .version { font-size: 1.5rem; font-weight: bold; margin: 0; }
        .last-update { font-size: 0.9rem; color: #666; margin: 5px 0 0; }

        /* ダウンロードボタン（緑） */
        .download-btn {
            display: block;
            background-color: var(--primary-green);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 40px;
            transition: transform 0.2s, background 0.2s;
        }

        .download-btn:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }

        /* スクリーンショット 2x2グリッド */
        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 40px;
        }

        .screenshot-grid img {
            width: 100%;
            border-radius: 15px; /* 縁を丸く */
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* 導入方法セクション */
        .howto-section {
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .howto-section h2 {
            font-size: 1.3rem;
            border-left: 5px solid var(--primary-green);
            padding-left: 10px;
            margin-bottom: 15px;
        }

        .content-body {
            font-size: 0.95rem;
            color: #444;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #007bff;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="mod-name">Tale Stars</div>
    </section>

    <div class="container">
        <div class="info-header">
            <div class="icon-box">
                <img src="../resources/tale/icon.png" alt="Icon">
            </div>
            <div class="info-meta">
                <p class="version">v66.109</p>
                <p class="last-update" id="js-update-date">最終更新: ----</p>
            </div>
        </div>

        <a href="https://example.com/download" target="_blank" class="download-btn">ダウンロード</a>

        <div class="screenshot-grid">
            <img src="../resources/tale/ss1.png" alt="SS1">
            <img src="../resources/tale/ss2.png" alt="SS2">
            <img src="../resources/tale/ss3.png" alt="SS3">
            <img src="../resources/tale/ss4.png" alt="SS4">
        </div>

        <section class="howto-section">
            <h2>導入方法</h2>
            <div class="content-body" id="js-info-content">
                読み込み中...
            </div>
        </section>

        <a href="../index.html" class="back-link">← リストに戻る</a>
    </div>

    <script>
        // 1. 日付をconfig.jsonから取得（共通管理したい場合）
        async function fetchInfo() {
            try {
                const ts = new Date().getTime();
                const response = await fetch('../config.json?' + ts);
                const config = await response.json();
                if (config.lastUpdated) {
                    document.getElementById('js-update-date').innerText = '最終更新: ' + config.lastUpdated;
                }

                // 2. info.htmlの中身を読み込んで表示する
                const infoRes = await fetch('../resources/tale/info.html?' + ts);
                const infoHtml = await infoRes.text();
                document.getElementById('js-info-content').innerHTML = infoHtml;
            } catch (e) {
                console.error("データの読み込みに失敗しました", e);
                document.getElementById('js-info-content').innerText = "説明文の読み込みに失敗しました。";
            }
        }

        window.onload = fetchInfo;
    </script>
</body>
</html>
